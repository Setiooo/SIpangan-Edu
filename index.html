<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIPANGAN EDU — Prototype Aplikasi</title>
<link rel="icon" type="image/png" href="favicon.png" />
<meta name="description" content="Prototype interaktif aplikasi SIPANGAN EDU — Platform Pengawasan & Transparansi Program Makan Bergizi Gratis (MBG) untuk Sekolah." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: { DEFAULT: '#2E7D32', dark: '#27682B', light: '#E8F5E9', disabled: '#A5D6A7' },
          secondary: '#4CAF50',
          accent: { DEFAULT: '#FFC107', dark: '#FFA000' },
          bg: '#F8FAFC',
          ink: { DEFAULT: '#1E293B', soft: '#64748B' },
          line: '#E2E8F0',
          danger: '#E53935',
        },
        fontFamily: { display: ['Poppins','sans-serif'], body: ['Inter','sans-serif'] },
        boxShadow: { soft: '0 2px 8px rgba(0,0,0,0.06)', card: '0 4px 16px rgba(0,0,0,0.08)' },
        borderRadius: { btn: '12px', card: '16px' },
      },
    },
  };
</script>
<style>
  body { font-family:'Inter',sans-serif; background:#eef2f6; }
  h1,h2,h3,h4,.font-display { font-family:'Poppins',sans-serif; }
  .phone-scroll::-webkit-scrollbar{width:0;background:transparent} .phone-scroll{scrollbar-width:none}
  .screen-enter{animation:fade .28s ease} @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .nav-active{color:#2E7D32}
  .dev-btn{transition:all .15s ease}
  .dev-on{background:#2E7D32;color:#fff!important}
  #screen > div{max-width:var(--appcol,100%);margin-left:auto;margin-right:auto}
  .tap{transition:transform .08s ease,background .15s ease,box-shadow .15s ease} .tap:active{transform:scale(.97)}
  .qr-line{animation:scan 2.2s ease-in-out infinite} @keyframes scan{0%{top:8%}50%{top:88%}100%{top:8%}}
  .sidebar-scroll::-webkit-scrollbar{width:6px} .sidebar-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
</style>
</head>
<body class="text-ink">
<div class="min-h-screen flex flex-col lg:flex-row">

  <!-- Toggle show/hide sidebar -->
  <button id="sidebarToggle" onclick="toggleSidebar()" class="fixed top-4 right-4 z-50 inline-flex items-center gap-2 px-3 py-2 rounded-xl bg-white border border-line shadow-card text-sm font-semibold text-ink-soft hover:text-primary transition">
    <i data-lucide="panel-left" class="w-4 h-4"></i>
    <span id="sidebarToggleLabel">Sembunyikan Daftar Layar</span>
  </button>

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar" class="lg:w-80 w-full bg-white border-r border-line lg:h-screen lg:sticky lg:top-0 flex flex-col">
    <div class="p-5 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl bg-white grid place-items-center shadow-soft border border-line overflow-hidden"><img src="logo.png" alt="SIPANGAN EDU" class="w-full h-full object-contain p-0.5" /></div>
        <div>
          <p class="font-display font-bold leading-tight">SIPANGAN EDU</p>
          <p class="text-xs text-ink-soft">Prototype Aplikasi</p>
        </div>
      </div>
    </div>

    <div id="indexHint" class="px-5 pt-4 pb-2"><p class="text-[11px] font-bold uppercase tracking-wide text-slate-400">Daftar Layar</p><p class="text-xs text-ink-soft leading-relaxed mt-1">Klik layar mana pun untuk membukanya. Tombol & bottom-nav di dalam app juga bisa diklik.</p></div>
    <nav id="screenIndex" class="flex-1 overflow-y-auto sidebar-scroll px-3 pb-6"></nav>
    <div class="p-4 border-t border-slate-100 text-[11px] text-ink-soft"><p>Platform Pengawasan & Transparansi Program Makan Bergizi Gratis.</p></div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="flex-1 flex flex-col items-center justify-start py-8 px-4 lg:py-12 overflow-y-auto">

    <!-- phone stage -->
    <div id="phoneStage" class="flex flex-col items-center">
      <div class="mb-5 text-center">
        <h1 class="font-display text-2xl font-bold text-slate-800" id="stageTitle">Splash Screen</h1>
        <p class="text-sm text-ink-soft" id="stageMeta">Layar 1 · Auth</p>
      </div>
      <!-- device switcher -->
      <div class="mb-6 inline-flex items-center gap-1 bg-white border border-line rounded-full p-1 shadow-soft">
        <button id="dev-phone" onclick="setDevice('phone')" class="dev-btn tap flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold text-ink-soft"><i data-lucide="smartphone" class="w-4 h-4"></i>HP</button>
        <button id="dev-tablet" onclick="setDevice('tablet')" class="dev-btn tap flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold text-ink-soft"><i data-lucide="tablet" class="w-4 h-4"></i>Tablet</button>
        <button id="dev-laptop" onclick="setDevice('laptop')" class="dev-btn tap flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold text-ink-soft"><i data-lucide="laptop" class="w-4 h-4"></i>Laptop</button>
      </div>

      <div id="deviceWrap" class="relative mx-auto transition-all duration-300" style="width:372px;max-width:100%">
        <div id="deviceBezel" class="relative bg-slate-900 rounded-[44px] p-3 shadow-2xl transition-all duration-300">
          <div id="browserBar" class="hidden items-center gap-1.5 px-4 h-9">
            <span class="w-3 h-3 rounded-full bg-red-400"></span>
            <span class="w-3 h-3 rounded-full bg-amber-400"></span>
            <span class="w-3 h-3 rounded-full bg-green-400"></span>
            <span class="ml-3 flex-1 h-5 rounded-md bg-slate-700/60"></span>
          </div>
          <div id="deviceNotch" class="absolute left-1/2 -translate-x-1/2 top-3 w-32 h-6 bg-slate-900 rounded-b-2xl z-30"></div>
          <div id="deviceScreenBox" class="bg-bg rounded-[34px] overflow-hidden relative transition-all duration-300" style="height:760px">
            <div id="statusBar" class="absolute top-0 inset-x-0 h-9 px-6 flex items-center justify-between text-[12px] font-semibold text-ink z-20 pointer-events-none">
              <span>09:41</span>
              <div class="flex items-center gap-1"><i data-lucide="signal" class="w-3.5 h-3.5"></i><i data-lucide="wifi" class="w-3.5 h-3.5"></i><i data-lucide="battery-full" class="w-4 h-4"></i></div>
            </div>
            <div id="screen" class="absolute inset-0 pt-9 overflow-y-auto phone-scroll"></div>
          </div>
        </div>
      </div>
      <div class="mt-6 flex items-center gap-3">
        <button onclick="prevScreen()" class="tap px-4 py-2 rounded-xl bg-white border border-line text-sm font-semibold text-ink-soft shadow-soft flex items-center gap-2"><i data-lucide="chevron-left" class="w-4 h-4"></i>Sebelumnya</button>
        <button onclick="nextScreen()" class="tap px-4 py-2 rounded-xl bg-primary text-white text-sm font-semibold shadow-soft flex items-center gap-2">Berikutnya<i data-lucide="chevron-right" class="w-4 h-4"></i></button>
      </div>
    </div>

  </main>
</div>

<script>
  function toggleSidebar(){
    var sb = document.getElementById('sidebar');
    var label = document.getElementById('sidebarToggleLabel');
    if(!sb) return;
    var isHidden = sb.classList.toggle('hidden');
    if(label) label.textContent = isHidden ? 'Tampilkan Daftar Layar' : 'Sembunyikan Daftar Layar';
  }
</script>
<script src="app.js"></script>
</body>
</html>
